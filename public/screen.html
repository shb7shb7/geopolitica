<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Geopolitica — Écran Principal</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050709;--bg2:#0a0c10;--bg3:#111520;--border:#1e2640;--gold:#c9a84c;--red:#c0392b;--green:#1a7a4a;--text:#d4d8e8;--text2:#8892b0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);width:100vw;height:100vh;overflow:hidden}

/* VIDEO */
#video-overlay{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center}
#video-overlay.active{display:flex}
#video-iframe{width:100%;height:100%;border:none}
#video-skip{position:absolute;bottom:28px;right:28px;background:rgba(0,0,0,.8);color:var(--gold);border:1px solid var(--gold);border-radius:4px;padding:10px 22px;font-size:13px;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:2px;z-index:101}
.vt-overlay{position:absolute;top:0;left:0;right:0;padding:28px;background:linear-gradient(180deg,rgba(0,0,0,.85),transparent);z-index:101}
.vt-overlay h2{font-size:26px;color:var(--gold);font-family:'Cinzel',serif}
.vt-overlay p{font-size:13px;color:var(--text2);margin-top:4px}

/* VIEWS */
.view{display:none;width:100vw;height:100vh;flex-direction:column}.view.active{display:flex}

/* WAITING */
#view-waiting{align-items:center;justify-content:center;gap:1.5rem;background:radial-gradient(ellipse at center,#0d1424,#050709)}
.wait-logo{font-size:80px;color:var(--gold);font-family:'Cinzel',serif;text-shadow:0 0 60px rgba(201,168,76,.2)}
.wait-sub{font-size:12px;color:var(--text2);letter-spacing:4px;text-transform:uppercase}
.pulse{width:100px;height:100px;border:1px solid rgba(201,168,76,.3);border-radius:50%;animation:rp 3s ease-in-out infinite}
@keyframes rp{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.3);opacity:.8}}

/* PROSPERITY */
#view-prosperity{background:radial-gradient(ellipse at 30% 30%,#0d1424,#050709)}
.pros-header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);flex-shrink:0}
.screen-logo{font-size:24px;color:var(--gold);font-family:'Cinzel',serif}
.per-badge{font-size:10px;padding:5px 16px;border:1px solid var(--gold);color:var(--gold);border-radius:2px;letter-spacing:3px;text-transform:uppercase}
.pros-body{flex:1;display:grid;grid-template-columns:1fr 340px;overflow:hidden;padding:20px;gap:20px}
.ev-card{background:linear-gradient(135deg,#0d1424,var(--bg3));border:1px solid var(--gold);border-radius:8px;padding:24px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px}
.ev-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.ev-period{font-size:10px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-family:'Cinzel',serif}
.ev-name{font-size:30px;font-weight:700;color:#fff;font-family:'Cinzel',serif;line-height:1.2}
.ev-desc{font-size:14px;color:var(--text);line-height:1.7}
.ev-effect{display:inline-block;font-size:12px;padding:7px 16px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:2px;color:var(--gold);letter-spacing:1px}

/* TIMER ON SCREEN */
.screen-timer{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 20px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:6px;margin-top:auto}
.screen-timer-val{font-size:52px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.screen-timer-val.urgent{color:#f87171;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.screen-timer-label{font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}

/* LEADERBOARD */
.lb-panel{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.lb-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text2);font-family:'Cinzel',serif;margin-bottom:4px}
.lb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);transition:all .3s}
.lb-item.first{background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));border-color:rgba(201,168,76,.4)}
.lb-pos{font-size:13px;font-weight:700;min-width:22px;color:var(--text2);font-family:'Cinzel',serif}
.lb-item.first .lb-pos{color:var(--gold)}
.lb-fl{font-size:22px}
.lb-nm{flex:1;font-size:13px;font-weight:600;color:#fff;font-family:'Cinzel',serif}
.lb-pw{font-size:12px;color:var(--text2)}
.lb-bw{width:100%;height:2px;background:var(--bg);margin-top:5px}
.lb-bf{height:100%;transition:width .5s}
.bfh{background:linear-gradient(90deg,var(--green),#4ade80)}.bfm{background:linear-gradient(90deg,#854d0e,#ca8a04)}.bfl{background:linear-gradient(90deg,var(--red),#f87171)}

/* WAR */
#view-war{background:#05020a}
.war-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid #2a0a0a;flex-shrink:0}
.war-logo{font-size:22px;color:#f87171;font-family:'Cinzel',serif;letter-spacing:2px}
.war-body{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden;padding:16px;gap:16px}

/* MAP */
.map-wrap{display:flex;flex-direction:column;gap:12px}
#world-map{flex:1;border:1px solid #1a0408;border-radius:8px}

/* WAR NATIONS */
.war-nations{display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.wn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:4px;border:1px solid #1a0408;background:#0a0204;transition:all .4s;position:relative;overflow:hidden}
.wn.elim{opacity:.25;filter:grayscale(1)}
.wn.elim::after{content:'CONQUIS';position:absolute;right:10px;font-size:9px;letter-spacing:2px;color:var(--red);font-family:'Cinzel',serif}
.wn-flag{font-size:22px}
.wn-name{flex:1;font-size:13px;font-weight:600;color:#fff;font-family:'Cinzel',serif}
.wn-pts{font-size:11px;color:#f87171;font-family:'Cinzel',serif}
.wbw{width:100%;height:2px;background:#1a0408;margin-top:4px}
.wbf{height:100%;background:linear-gradient(90deg,var(--red),#f87171);transition:width .5s}

/* WAR TIMER */
.war-timer-wrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 16px;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:6px}
.war-timer-val{font-size:40px;font-weight:700;color:#f87171;font-family:'Cinzel',serif;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.war-timer-val.urgent{animation:pulse 1s infinite}

/* ATTACK ANIMATION */
.attack-anim{position:fixed;inset:0;background:rgba(192,57,43,0);z-index:50;pointer-events:none}
.attack-anim.flash{animation:warflash 2s ease-out forwards}
@keyframes warflash{0%{background:rgba(192,57,43,0)}8%{background:rgba(192,57,43,.7)}25%{background:rgba(192,57,43,.35)}100%{background:rgba(192,57,43,0)}}
.battle-result{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg2);border:2px solid var(--gold);border-radius:10px;padding:32px 44px;z-index:51;text-align:center;display:none;min-width:380px}
.battle-result.show{display:block;animation:bpop .5s ease-out}
@keyframes bpop{0%{transform:translate(-50%,-50%) scale(.6);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
</style>
</head>
<body>

<div class="attack-anim" id="anim-flash"></div>
<div class="battle-result" id="battle-result">
  <div id="br-icon" style="font-size:52px;margin-bottom:10px"></div>
  <div id="br-title" style="font-size:22px;font-weight:700;font-family:'Cinzel',serif;margin-bottom:8px;color:#fff"></div>
  <div id="br-flags" style="font-size:36px;margin-bottom:10px"></div>
  <div id="br-scores" style="font-size:14px;color:var(--text2);line-height:1.8"></div>
</div>

<!-- VIDEO -->
<div id="video-overlay">
  <div class="vt-overlay"><h2 id="vt-title"></h2><p id="vt-sub"></p></div>
  <iframe id="video-iframe" allowfullscreen allow="autoplay"></iframe>
  <button id="video-skip" onclick="hideVideo()">Passer →</button>
</div>

<!-- WAITING -->
<div id="view-waiting" class="view active">
  <div class="pulse"></div>
  <div class="wait-logo">Geopolitica</div>
  <div class="wait-sub">En attente du début de la partie</div>
</div>

<!-- PROSPERITY -->
<div id="view-prosperity" class="view">
  <div class="pros-header">
    <div class="screen-logo">Geopolitica</div>
    <div class="per-badge" id="sc-per-badge">Période 1/6</div>
    <div style="font-size:12px;color:var(--text2)" id="sc-nations">0 nations</div>
  </div>
  <div class="pros-body">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="ev-card">
        <div class="ev-period" id="sc-ev-period">Période 1</div>
        <div class="ev-name" id="sc-ev-name">—</div>
        <div class="ev-desc" id="sc-ev-desc"></div>
        <div class="ev-effect" id="sc-ev-effect"></div>
      </div>
      <div class="screen-timer">
        <div>
          <div class="screen-timer-label">Temps restant</div>
          <div class="screen-timer-val" id="sc-timer">10:00</div>
        </div>
      </div>
    </div>
    <div class="lb-panel">
      <div class="lb-title">Classement des nations</div>
      <div id="sc-lb"></div>
    </div>
  </div>
</div>

<!-- WAR -->
<div id="view-war" class="view">
  <div class="war-header">
    <div class="war-logo">⚔️ Guerre Mondiale</div>
    <div class="war-timer-wrap">
      <div class="war-timer-val" id="war-timer">10:00</div>
    </div>
    <div style="font-size:12px;color:#f87171;letter-spacing:2px;text-transform:uppercase" id="war-alive">0 nations</div>
  </div>
  <div class="war-body">
    <div class="map-wrap">
      <svg id="world-map" viewBox="0 0 800 380" style="width:100%;flex:1">
        <rect width="800" height="380" fill="#05020a" rx="8"/>
        <g stroke="#140308" stroke-width="0.5" fill="none">
          <line x1="0" y1="127" x2="800" y2="127"/><line x1="0" y1="190" x2="800" y2="190"/>
          <line x1="0" y1="253" x2="800" y2="253"/><line x1="200" y1="0" x2="200" y2="380"/>
          <line x1="400" y1="0" x2="400" y2="380"/><line x1="600" y1="0" x2="600" y2="380"/>
        </g>
        <g fill="#0a0204" stroke="#1a0408" stroke-width="1">
          <ellipse cx="150" cy="150" rx="105" ry="75"/>
          <ellipse cx="195" cy="285" rx="55" ry="75"/>
          <ellipse cx="375" cy="118" rx="58" ry="45"/>
          <ellipse cx="385" cy="265" rx="75" ry="90"/>
          <ellipse cx="585" cy="150" rx="135" ry="95"/>
          <ellipse cx="655" cy="305" rx="65" ry="45"/>
        </g>
        <g id="map-countries"></g>
        <g id="map-anims"></g>
      </svg>
    </div>
    <div class="war-nations" id="war-nations"></div>
  </div>
</div>

<script>
const socket = io();
let state = {}, timerSec = 600, lastPhase = null, lastPeriod = 0;

const MAP_POS = {
  usa:{x:130,y:150}, china:{x:615,y:145}, russia:{x:555,y:92},
  germany:{x:385,y:108}, qatar:{x:475,y:188}, france:{x:360,y:118},
  brazil:{x:205,y:285}, india:{x:555,y:195}, morocco:{x:348,y:205}, guinea:{x:325,y:242},
};
const COLORS = {
  usa:'#3b82f6',china:'#ef4444',russia:'#8b5cf6',germany:'#f59e0b',
  qatar:'#06b6d4',france:'#ec4899',brazil:'#22c55e',india:'#f97316',
  morocco:'#84cc16',guinea:'#14b8a6',
};

socket.on('state', s => { const prev=state; state=s; onUpdate(prev); });
socket.on('timer', ({seconds,running,ended}) => {
  timerSec=seconds;
  updateTimers();
  if(ended) flashTimer();
});
socket.on('attackAnimation', ({attackerId,defenderId,success,scoreAtt,scoreDef}) => {
  showBattleResult(attackerId,defenderId,success,scoreAtt,scoreDef);
});

function showView(id){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function showVideo(src,title,sub,dur){
  document.getElementById('video-iframe').src=src;
  document.getElementById('vt-title').textContent=title;
  document.getElementById('vt-sub').textContent=sub||'';
  document.getElementById('video-overlay').classList.add('active');
  if(dur) setTimeout(hideVideo,dur);
}
function hideVideo(){ document.getElementById('video-overlay').classList.remove('active'); document.getElementById('video-iframe').src=''; }

function updateTimers(){
  const m=Math.floor(timerSec/60),s=timerSec%60;
  const fmt=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const urgent=timerSec<60;
  const st=document.getElementById('sc-timer');
  const wt=document.getElementById('war-timer');
  if(st){ st.textContent=fmt; st.className='screen-timer-val'+(urgent?' urgent':''); }
  if(wt){ wt.textContent=fmt; wt.className='war-timer-val'+(urgent?' urgent':''); }
}

function flashTimer(){
  ['sc-timer','war-timer'].forEach(id=>{ const el=document.getElementById(id); if(el){ el.style.color='#f87171'; setTimeout(()=>el.style.color='',3000); }});
}

function showBattleResult(attId,defId,success,scoreAtt,scoreDef){
  const fl=document.getElementById('anim-flash');
  fl.classList.add('flash'); setTimeout(()=>fl.classList.remove('flash'),2000);
  const att=state.countries&&state.countries[attId];
  const def=state.countries&&state.countries[defId];
  if(!att||!def) return;
  document.getElementById('br-icon').textContent=success?'💥':'🛡️';
  document.getElementById('br-title').textContent=success?'Victoire écrasante !':'Attaque repoussée !';
  document.getElementById('br-flags').textContent=att.flag+' ⚔️ '+def.flag;
  document.getElementById('br-scores').innerHTML=`<strong style="color:${success?'#4ade80':'#f87171'}">${att.flag} ${att.name}</strong>: ${scoreAtt} pts<br><strong style="color:${success?'#f87171':'#4ade80'}">${def.flag} ${def.name}</strong>: ${scoreDef} pts<br><br>${success?att.flag+' '+att.name+' pille toutes les ressources !':def.flag+' '+def.name+' tient bon !'}`;
  const br=document.getElementById('battle-result');
  br.classList.add('show'); setTimeout(()=>br.classList.remove('show'),8000);
}

function onUpdate(prev){
  if(state.phase!==lastPhase){
    if(state.phase==='war'&&lastPhase!=='war'){
      showVideo(state.warVideo,'⚔️ La Guerre Commence','Le monde entier attend son maître. Personne ne veut plier.',35000);
      setTimeout(()=>showView('view-war'),500);
    } else if(state.phase==='prosperity') showView('view-prosperity');
    else if(state.phase==='draft'||state.phase==='setup') showView('view-waiting');
    lastPhase=state.phase;
  }
  if(state.currentPeriod!==lastPeriod&&state.currentPeriod>0&&state.phase==='prosperity'){
    if(state.currentEvent?.periodVideo) showVideo(state.currentEvent.periodVideo,state.currentEvent.periodName,state.currentEvent.periodSubtitle,22000);
    lastPeriod=state.currentPeriod;
  }
  if(state.phase==='prosperity') renderProsperity();
  if(state.phase==='war') renderWar();
}

function renderProsperity(){
  const countries=state.countries||{};
  const alive=Object.values(countries).filter(c=>c.team&&!c.eliminated);
  const sorted=[...alive].sort((a,b)=>b.power-a.power);
  const maxP=sorted[0]?.power||1;
  document.getElementById('sc-per-badge').textContent=`Période ${state.currentPeriod||1}/6`;
  document.getElementById('sc-nations').textContent=alive.length+' nations';
  if(state.currentEvent){
    const ev=state.currentEvent;
    document.getElementById('sc-ev-period').textContent=`Période ${ev.periodNumber||''} · ${ev.periodSubtitle||''}`;
    document.getElementById('sc-ev-name').textContent=ev.periodName||'';
    document.getElementById('sc-ev-desc').textContent=ev.periodDesc||'';
    document.getElementById('sc-ev-effect').textContent='⚡ '+ev.title+' — '+ev.effect;
  }
  document.getElementById('sc-lb').innerHTML=sorted.map((c,i)=>{
    const pct=Math.round(c.power/maxP*100);
    const bc=pct<30?'bfl':pct<60?'bfm':'bfh';
    return `<div class="lb-item ${i===0?'first':''}"><div class="lb-pos">${i+1}</div><div class="lb-fl">${c.flag}</div><div style="flex:1"><div style="display:flex;justify-content:space-between"><div class="lb-nm">${c.name}</div><div class="lb-pw">${c.power} pts</div></div><div class="lb-bw"><div class="lb-bf ${bc}" style="width:${pct}%"></div></div></div></div>`;
  }).join('');
}

function renderWar(){
  const countries=state.countries||{};
  const teams=Object.values(countries).filter(c=>c.team);
  const alive=teams.filter(c=>!c.eliminated);
  const sorted=[...teams].sort((a,b)=>b.power-a.power);
  const maxP=Math.max(...teams.map(c=>c.power),1);
  document.getElementById('war-alive').textContent=alive.length+' nations actives';
  document.getElementById('war-nations').innerHTML=sorted.map(c=>{
    const pct=Math.round(c.power/maxP*100);
    return `<div class="wn ${c.eliminated?'elim':''}"><div class="wn-flag">${c.flag}</div><div style="flex:1"><div style="display:flex;justify-content:space-between"><div class="wn-name">${c.name}</div><div class="wn-pts">${c.power} pts</div></div><div class="wbw"><div class="wbf" style="width:${pct}%"></div></div></div></div>`;
  }).join('');
  // Map
  const mapG=document.getElementById('map-countries');
  mapG.innerHTML='';
  teams.forEach(c=>{
    const pos=MAP_POS[c.id]; if(!pos) return;
    const color=COLORS[c.id]||'#fff';
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    const glow=document.createElementNS('http://www.w3.org/2000/svg','circle');
    glow.setAttribute('cx',pos.x);glow.setAttribute('cy',pos.y);glow.setAttribute('r','20');
    glow.setAttribute('fill',c.eliminated?'#1a0408':color);glow.setAttribute('opacity',c.eliminated?'0.05':'0.18');
    g.appendChild(glow);
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',pos.x);dot.setAttribute('cy',pos.y);dot.setAttribute('r','9');
    dot.setAttribute('fill',c.eliminated?'#2a0a0a':color);dot.setAttribute('stroke','#000');dot.setAttribute('stroke-width','1.5');
    g.appendChild(dot);
    const flag=document.createElementNS('http://www.w3.org/2000/svg','text');
    flag.setAttribute('x',pos.x);flag.setAttribute('y',pos.y-18);flag.setAttribute('text-anchor','middle');flag.setAttribute('font-size','22');
    flag.setAttribute('opacity',c.eliminated?'0.15':'1');
    flag.textContent=c.flag;g.appendChild(flag);
    const nm=document.createElementNS('http://www.w3.org/2000/svg','text');
    nm.setAttribute('x',pos.x);nm.setAttribute('y',pos.y+22);nm.setAttribute('text-anchor','middle');nm.setAttribute('font-size','8');
    nm.setAttribute('fill',c.eliminated?'#2a0a0a':color);nm.setAttribute('font-family','Cinzel,serif');nm.setAttribute('letter-spacing','1');
    nm.textContent=c.name.toUpperCase();g.appendChild(nm);
    mapG.appendChild(g);
  });
}
</script>
</body>
</html>
